<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>TOOLS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/launcher.css">
    <script>
        window.supabaseReady = {{ 'true' if supabase_ready else 'false' }};
    </script>
    <script src="/static/js/auth/signup_login.js" defer></script>
    <script src="/static/js/auth/logout.js" defer></script>
    <script src="/static/js/auth/verification.js" defer></script>
    <script src="/static/js/auth.js" defer></script>
    <script src="/static/js/tabs/browser_tabs.js" defer></script>
    <script src="/static/js/tabs/kmz_converter_tab.js" defer></script>
    <script src="/static/js/tabs/tutorial_tab.js" defer></script>
    <script src="/static/js/tabs/gis_tab.js" defer></script>
    <script src="/static/js/tabs/tab_orchestrator.js" defer></script>
</head>
<body data-active-menu="{{ active_menu or 'home' }}">
    <div class="browser-shell">
        <div class="browser-topbar">
            <div class="window-dots" aria-hidden="true">
                <span class="dot dot-red"></span>
                <span class="dot dot-yellow"></span>
                <span class="dot dot-green"></span>
            </div>
            <div class="top-actions">
                <button type="button" class="top-btn" id="openSignupBtn">Sign Up</button>
                <button type="button" class="top-btn" id="openLoginBtn">Login</button>
                <button type="button" class="top-btn" id="logoutBtn" style="display: none;">Logout</button>
                <button type="button" class="top-btn top-btn-gear" id="openSettingBtn" aria-label="Setting" title="Setting">
                    <span class="gear-icon" aria-hidden="true">&#9881;</span>
                </button>
            </div>
        </div>

        <div class="auth-strip" id="authStrip">{% if auth_user and auth_user.get('email') %}Login sebagai {{ auth_user.get('email') }}{% else %}Belum login{% endif %}</div>

        <div class="browser-tabs">
            <button type="button" class="browser-tab" data-browser-tab="history">Tutorial</button>
            <button type="button" class="browser-tab active" data-browser-tab="kmz">KMZ Converter</button>
            <button type="button" class="browser-tab" data-browser-tab="tools">GIS</button>
        </div>

        {% include 'tabs/kmz_converter_tab.html' %}
        {% include 'tabs/gis_tab.html' %}
        {% include 'tabs/tutorial_tab.html' %}
    </div>

    <div class="auth-modal" id="signupModal" aria-hidden="true">
        <div class="auth-card">
            <div class="auth-title">Create Account</div>
            <form id="signupForm" class="auth-form">
                <label for="signupName">Full Name</label>
                <input id="signupName" name="full_name" type="text" required>

                <label for="signupEmail">Email</label>
                <input id="signupEmail" name="email" type="email" required>

                <label for="signupPassword">Password</label>
                <input id="signupPassword" name="password" type="password" minlength="8" required>

                <div class="auth-actions">
                    <button type="button" class="plain-btn" id="signupCloseBtn">Cancel</button>
                    <button type="submit" class="accent-btn">Sign Up</button>
                </div>
                <div class="auth-feedback" id="signupFeedback"></div>
            </form>
        </div>
    </div>

    <div class="auth-modal" id="loginModal" aria-hidden="true">
        <div class="auth-card">
            <div class="auth-title">Welcome Back</div>
            <form id="loginForm" class="auth-form">
                <label for="loginEmail">Email</label>
                <input id="loginEmail" name="email" type="email" required>

                <label for="loginPassword">Password</label>
                <input id="loginPassword" name="password" type="password" required>

                <div class="auth-actions">
                    <button type="button" class="plain-btn" id="loginCloseBtn">Cancel</button>
                    <button type="submit" class="accent-btn">Login</button>
                </div>
                <div class="auth-feedback" id="loginFeedback"></div>
            </form>
        </div>
    </div>

</body>
</html>
